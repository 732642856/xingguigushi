<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>渡者无归</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0a0a0a;overflow:hidden;font-family:"Noto Serif SC","SimSun",serif;color:#dcc8b0;cursor:none}
#cursor-glow{position:fixed;width:80px;height:80px;border-radius:50%;background:radial-gradient(circle,rgba(160,220,210,0.25) 0%,transparent 70%);pointer-events:none;transform:translate(-50%,-50%);z-index:9999;mix-blend-mode:screen;transition:background .3s}
#cursor-glow.warm{background:radial-gradient(circle,rgba(220,180,140,0.35) 0%,transparent 70%)}
#cursor-glow.danger{background:radial-gradient(circle,rgba(180,40,40,0.4) 0%,transparent 70%)}
.scene{position:fixed;inset:0;opacity:0;pointer-events:none;transition:opacity 1.5s ease-in-out,filter 3s;z-index:1}
.scene.active{opacity:1;pointer-events:auto;z-index:10}
.scene .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(.85) contrast(1.1)}
.hotzone{position:absolute;background:rgba(0,0,0,0);cursor:pointer;z-index:20;border:1px dashed rgba(220,200,180,0.08);transition:all .5s}
.hotzone::before{content:"";position:absolute;inset:-6px;border-radius:3px;border:1px solid rgba(160,220,210,0);transition:all .5s}
.hotzone:hover{background:rgba(160,220,210,.04);border-color:rgba(160,220,210,.2)}
.hotzone:hover::before{border-color:rgba(160,220,210,.15);box-shadow:0 0 25px 6px rgba(160,220,210,.1),inset 0 0 15px rgba(160,220,210,.06)}
.hotzone.locked{border:1px dashed rgba(139,0,0,.1)}
.hotzone.locked:hover{background:rgba(139,0,0,.03);border-color:rgba(139,0,0,.15)}
.hotzone.locked:hover::before{border-color:rgba(139,0,0,.12);box-shadow:0 0 25px 6px rgba(139,0,0,.08)}
.hotzone-label{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:.62rem;color:rgba(220,200,180,0);white-space:nowrap;letter-spacing:.06em;transition:color .5s;pointer-events:none;background:rgba(0,0,0,.35);padding:3px 10px;border-radius:3px}
.hotzone:hover .hotzone-label{color:rgba(220,200,180,.5)}
#hud{position:fixed;top:0;left:0;right:0;height:44px;background:linear-gradient(180deg,rgba(10,10,10,.85) 0%,transparent 100%);z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 24px;pointer-events:none;opacity:0;transition:opacity 1.5s}
#hud.show{opacity:1}
.hud-chapter{font-size:.8rem;letter-spacing:.12em;color:#a09080}
.hud-chapter .chapter-label{font-size:.6rem;color:#5a4a3a;display:block;margin-bottom:1px}
#chapter-card{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;opacity:0;pointer-events:none;transition:opacity 1.2s}
#chapter-card.show{opacity:1;pointer-events:auto}
.chapter-num{font-size:.75rem;letter-spacing:.4em;color:#8B0000;margin-bottom:14px}
.chapter-title{font-size:clamp(1.5rem,4.5vw,2.4rem);letter-spacing:.25em;color:#dcc8b0;margin-bottom:10px;text-shadow:0 0 25px rgba(220,200,180,.12)}
.chapter-sub{font-size:.8rem;color:#5a4a3a;letter-spacing:.12em;max-width:360px;text-align:center;line-height:1.7}
.chapter-hint{margin-top:2.5em;font-size:.7rem;color:#3a2a1a;animation:pulse 2.5s ease-in-out infinite;letter-spacing:.1em}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:.8}}
#action-hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:150;font-size:.75rem;color:rgba(220,200,180,.25);letter-spacing:.08em;pointer-events:none;opacity:0;transition:opacity 1s;background:rgba(0,0,0,.25);padding:5px 14px;border-radius:16px}
#action-hint.show{opacity:1}
#subtitle-container{position:fixed;bottom:12vh;left:50%;transform:translateX(-50%);width:88%;max-width:720px;z-index:100;pointer-events:none;text-align:center}
.subtitle-main{font-size:clamp(1rem,2.2vw,1.25rem);line-height:2.2;letter-spacing:.03em;text-shadow:0 2px 14px rgba(0,0,0,.97),0 0 28px rgba(0,0,0,.95);opacity:0;transition:opacity .8s;min-height:2.2em;white-space:pre-line}
.subtitle-main.show{opacity:1}
.subtitle-system{color:#8aa0b8;text-shadow:0 0 8px rgba(100,140,180,.4);letter-spacing:.08em;font-size:.95em}
.subtitle-human{color:#dcc8b0;text-shadow:0 0 10px rgba(220,180,140,.35)}
.subtitle-aying{color:#c8a090;text-shadow:0 0 10px rgba(180,100,80,.3);font-style:italic}
.subtitle-child{color:#a0c0d0;text-shadow:0 0 8px rgba(100,160,200,.25);font-style:italic}
.subtitle-warm{color:#e0c898;text-shadow:0 0 10px rgba(220,190,140,.25)}
.subtitle-cave{color:#b0a890;text-shadow:0 0 8px rgba(160,140,100,.2);letter-spacing:.06em}
.subtitle-appendix{font-size:.68em;color:rgba(200,160,140,.3);margin-top:.8em;text-shadow:0 0 8px rgba(0,0,0,.95);opacity:0;transition:opacity 1s .8s}
.subtitle-appendix.show{opacity:1}
#progress-bar{position:fixed;bottom:7vh;left:50%;transform:translateX(-50%);width:180px;height:2px;background:rgba(220,180,140,.12);z-index:100;opacity:0;transition:opacity .6s;border-radius:1px}
#progress-bar.show{opacity:1}
#progress-bar-fill{height:100%;width:0%;background:linear-gradient(90deg,rgba(220,180,140,.5),rgba(200,160,100,.8));transition:width .08s;border-radius:1px}
#chest-glow{position:absolute;width:100px;height:140px;border-radius:50%;background:radial-gradient(ellipse,rgba(240,220,200,.35) 0%,transparent 70%);pointer-events:none;opacity:0;transition:opacity .4s;z-index:15;filter:blur(10px)}
.glitch-overlay{position:fixed;inset:0;background:rgba(100,150,200,.06);pointer-events:none;z-index:60;opacity:0}
@keyframes glitch-flash{0%,100%{opacity:0}10%{opacity:.6}20%{opacity:0}30%{opacity:.4}40%{opacity:0}}
.glitch-overlay.active{animation:glitch-flash .6s ease-out}
.ember{position:absolute;width:2px;height:2px;background:rgba(255,120,40,.7);border-radius:50%;pointer-events:none;animation:ember-rise 4s ease-out forwards}
@keyframes ember-rise{0%{transform:translateY(0) scale(1);opacity:.7}100%{transform:translateY(-100px) scale(.1);opacity:0}}
#scanlines{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.02) 3px,rgba(0,0,0,.02) 6px);pointer-events:none;z-index:50}
#vignette{position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,.55) 100%);pointer-events:none;z-index:40}
#start-screen{position:fixed;inset:0;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:opacity 2s}
#start-screen.hidden{opacity:0;pointer-events:none}
.start-title{font-size:clamp(2rem,6vw,4rem);letter-spacing:.4em;color:#dcc8b0;text-shadow:0 0 35px rgba(220,200,180,.15);margin-bottom:.6em}
.start-sub{font-size:clamp(.75rem,1.8vw,1.1rem);color:#6a5a4a;letter-spacing:.12em;margin-bottom:3.5em;line-height:1.8;text-align:center;max-width:500px}
.start-hint{font-size:.85rem;color:#4a3a2a;animation:pulse 2.5s ease-in-out infinite;cursor:pointer;padding:.8em 2em;border:1px solid rgba(139,0,0,.25);letter-spacing:.12em}
.end-content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#0a0a0a 0%,#1a1510 50%,#0a0a0a 100%)}
.end-line{font-size:clamp(1rem,2.5vw,1.5rem);color:#b8a890;letter-spacing:.12em;margin:.6em 0;opacity:0;transform:translateY(24px);transition:all 2s;text-align:center;line-height:1.8}
.end-line.show{opacity:1;transform:translateY(0)}
#input-ritual{position:absolute;bottom:18%;left:50%;transform:translateX(-50%);background:transparent;border:none;border-bottom:1px solid rgba(180,140,100,.25);color:#dcc8b0;font-family:"Noto Serif SC",serif;font-size:1.1rem;text-align:center;width:220px;outline:none;caret-color:#a08060;letter-spacing:.08em;opacity:0;transition:opacity 1.2s;z-index:50}
#input-ritual.show{opacity:1}
#final-lantern{position:fixed;left:50%;top:55%;transform:translate(-50%,-50%);opacity:0;transition:opacity 10s ease;z-index:100}
.lantern-body{width:50px;height:70px;background:radial-gradient(ellipse,rgba(240,200,120,.5) 0%,transparent 70%);border-radius:50% 50% 45% 45%;filter:blur(2px);animation:lantern-float 5s ease-in-out infinite}
@keyframes lantern-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.lantern-wish{margin-top:16px;font-size:.75rem;color:#dcc8b0;text-align:center;letter-spacing:.08em}
@media(max-width:768px){.hud-chapter{font-size:.7rem}.hotzone-label{font-size:.55rem}#subtitle-container{bottom:14vh}}
</style>
</head>

let holdStart=0,holdProgress=0,holdAnim=null,isHolding=false;

function showY3Input(){const inp=document.createElement("input");inp.type="text";inp.style.cssText="position:absolute;bottom:18%;left:50%;transform:translateX(-50%);background:transparent;border:none;border-bottom:1px solid rgba(220,180,140,.35);color:#e8c880;font-family:'Noto Serif SC',serif;font-size:1.1rem;text-align:center;width:220px;outline:none;caret-color:#e8c880;letter-spacing:.08em;z-index:50";document.getElementById("node-y3").appendChild(inp);inp.focus();inp.addEventListener("keydown",(e)=>{if(e.key!=="Enter")return;const val=inp.value.trim();State.nextLifeInput=val;inp.remove();let response="";if(val.includes("阿缨"))response=`织在领口。
