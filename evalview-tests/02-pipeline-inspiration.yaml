name: pipeline-phase2-inspiration
description: "测试灵感开发阶段：从零散想法到大纲的层层递进"
turns:
  - query: "我有个灵感，关于一个能听到死人最后遗言的法医"
    expected:
      output:
        contains: ["核心冲突", "主角", "情感体验"]
        not_contains: ["好的以下是完整剧本"]
  - query: "展开成梗概"
    expected:
      output:
        contains: ["起", "承", "转", "合"]
  - query: "生成大纲"
    expected:
      output:
        contains: ["主线", "支线", "情节点"]
thresholds:
  min_score: 65
